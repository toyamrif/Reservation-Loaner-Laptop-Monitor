<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loaner機器予約システム</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Amazon Ember', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #EAEDED;
            min-height: 100vh;
            padding: 0;
        }
        
        .language-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .language-selector select {
            padding: 10px 15px;
            background: #232F3E;
            border: 1px solid #485769;
            border-radius: 10px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .language-selector select:hover {
            background: #37475A;
        }
        
        .language-selector select option {
            background: #232F3E;
            color: #ffffff;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #FFFFFF;
            border-radius: 16px;
            border: 1px solid #DDD;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 35px 40px;
        }
        
        h1 {
            color: #232F3E;
            text-align: center;
            margin-bottom: 35px;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0;
        }
        
        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 35px;
            position: relative;
        }
        
        .progress-bar::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 2px;
            background: #DDD;
            z-index: 0;
        }
        
        .progress-step {
            flex: 1;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        
        .progress-step-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #DDD;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .progress-step.active .progress-step-circle {
            background: #FF9900;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 153, 0, 0.4);
        }
        
        .progress-step.completed .progress-step-circle {
            background: #067D62;
            color: #fff;
        }
        
        .progress-step-label {
            color: #888;
            font-size: 12px;
            font-weight: 500;
        }
        
        .progress-step.active .progress-step-label {
            color: #232F3E;
            font-weight: 600;
        }
        
        .error-message {
            display: none;
            background: rgba(255, 107, 107, 0.9);
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 14px;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }
        
        .error-message.show {
            display: block;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .form-step {
            display: none;
        }
        
        .form-step.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group.error input,
        .form-group.error select {
            border-color: rgba(255, 107, 107, 0.8);
            background: rgba(255, 107, 107, 0.1);
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: #232F3E;
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            max-width: 300px;
            padding: 10px 14px;
            background: #FFFFFF;
            border: 1px solid #CCC;
            border-radius: 10px;
            font-size: 14px;
            color: #111;
            transition: all 0.2s;
        }
        
        input::placeholder {
            color: #888;
        }
        
        input:focus,
        select:focus {
            outline: none;
            border-color: #FF9900;
            box-shadow: 0 0 3px rgba(255, 153, 0, 0.5);
        }
        
        select {
            cursor: pointer;
        }
        
        select option {
            background: #fff;
            color: #111;
        }
        
        .equipment-section {
            background: #F7F8FA;
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 20px;
            border: 1px solid #E0E0E0;
        }
        
        .equipment-section h3 {
            color: #232F3E;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .quantity-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .quantity-row:last-child {
            margin-bottom: 0;
        }
        
        .quantity-label {
            color: #232F3E;
            font-size: 14px;
            font-weight: 500;
        }
        
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .quantity-control button {
            width: 35px;
            height: 35px;
            border: 1px solid #CCC;
            background: #F7F8FA;
            color: #232F3E;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .quantity-control button:hover {
            background: #FF9900;
            color: #fff;
            border-color: #FF9900;
        }
        
        .quantity-control button:active {
            transform: scale(0.95);
        }
        
        .quantity-control span {
            min-width: 40px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            color: #232F3E;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            max-width: 80%;
            margin-left: auto;
            margin-right: auto;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-next,
        .btn-submit {
            background: #FF9900;
            color: #111;
        }
        
        .btn-prev {
            background: #E7E9EC;
            color: #111;
        }
        
        .btn:hover {
            opacity: 0.9;
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .required {
            color: #ff6b6b;
        }
        
        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            font-style: italic;
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div style="background: #232F3E; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div style="color: #FF9900; font-size: 20px; font-weight: 700;">🖥️ Loaner機器予約</div>
        <div style="display: flex; gap: 15px;">
            <a href="admin.html" style="color: #fff; text-decoration: none; font-size: 14px;">🛠️ 管理画面</a>
            <a href="return.html" style="color: #fff; text-decoration: none; font-size: 14px;">🔄 返却管理</a>
        </div>
    </div>
    
    <div class="language-selector">
        <select id="languageSelect" onchange="changeLanguage()">
            <option value="ja">日本語</option>
            <option value="en">English</option>
        </select>
    </div>
    
    <div style="padding: 20px;">
    <div class="container">
        <h1 id="pageTitle">🖥️ Loaner機器予約システム</h1>
        
        <div class="progress-bar">
            <div class="progress-step active" data-step="1">
                <div class="progress-step-circle">1</div>
                <div class="progress-step-label" data-lang-ja="基本情報" data-lang-en="Basic Info">基本情報</div>
            </div>
            <div class="progress-step" data-step="2">
                <div class="progress-step-circle">2</div>
                <div class="progress-step-label" data-lang-ja="機器選択" data-lang-en="Equipment">機器選択</div>
            </div>
            <div class="progress-step" data-step="3">
                <div class="progress-step-circle">3</div>
                <div class="progress-step-label" data-lang-ja="期間設定" data-lang-en="Duration">期間設定</div>
            </div>
            <div class="progress-step" data-step="4">
                <div class="progress-step-circle">4</div>
                <div class="progress-step-label" data-lang-ja="確認" data-lang-en="Confirm">確認</div>
            </div>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <form id="reservationForm">
            <!-- Step 1: Basic Information -->
            <div class="form-step active" data-step="1">
                <div class="form-group" id="aliasGroup">
                    <label for="alias">Alias <span class="required">*</span></label>
                    <input type="text" id="alias" name="alias" placeholder="your-alias">
                </div>
                
                <div class="form-group" id="pickupSiteGroup">
                    <label for="pickupSite" data-lang-ja="Pick Up Site" data-lang-en="Pick Up Site">Pick Up Site <span class="required">*</span></label>
                    <select id="pickupSite" name="pickupSite">
                        <option value="" data-lang-ja="選択してください" data-lang-en="Please select">選択してください</option>
                        <option value="HND10">HND10</option>
                        <option value="HND11">HND11</option>
                        <option value="HND17">HND17</option>
                        <option value="HND21">HND21</option>
                    </select>
                </div>
                
                <div class="button-group">
                    <button type="button" class="btn btn-next" id="nextBtn1" data-lang-ja="次へ" data-lang-en="Next">次へ</button>
                </div>
            </div>
            
            <!-- Step 2: Equipment Selection -->
            <div class="form-step" data-step="2">
                <div class="equipment-section">
                    <h3 data-lang-ja="💻 予約機器" data-lang-en="💻 Equipment">💻 予約機器</h3>
                    
                    <div class="quantity-row">
                        <span class="quantity-label">Non-Amazon PC</span>
                        <div class="quantity-control">
                            <button type="button" id="nonAmazonMinus">-</button>
                            <span id="nonAmazonQuantity">0</span>
                            <button type="button" id="nonAmazonPlus">+</button>
                        </div>
                    </div>
                    
                    <div class="quantity-row">
                        <span class="quantity-label">Amazon PC</span>
                        <div class="quantity-control">
                            <button type="button" id="amazonMinus">-</button>
                            <span id="amazonQuantity">0</span>
                            <button type="button" id="amazonPlus">+</button>
                        </div>
                    </div>
                    
                    <p class="info-text" data-lang-ja="パソコン合計: 最大20台まで選択可能" data-lang-en="Total PCs: Maximum 20 units">パソコン合計: 最大20台まで選択可能</p>
                    
                    <div class="quantity-row" style="margin-top: 20px;">
                        <span class="quantity-label" data-lang-ja="モニター" data-lang-en="Monitor">モニター</span>
                        <div class="quantity-control">
                            <button type="button" id="monitorMinus">-</button>
                            <span id="monitorQuantity">0</span>
                            <button type="button" id="monitorPlus">+</button>
                        </div>
                    </div>
                    
                    <p class="info-text" data-lang-ja="最大10台まで選択可能" data-lang-en="Maximum 10 units">最大10台まで選択可能</p>
                </div>
                
                <div class="button-group">
                    <button type="button" class="btn btn-prev" id="prevBtn2" data-lang-ja="戻る" data-lang-en="Back">戻る</button>
                    <button type="button" class="btn btn-next" id="nextBtn2" data-lang-ja="次へ" data-lang-en="Next">次へ</button>
                </div>
            </div>
            
            <!-- Step 3: Date Selection -->
            <div class="form-step" data-step="3">
                <div class="form-group" id="startDateGroup">
                    <label for="startDate" data-lang-ja="貸出開始日" data-lang-en="Start Date">貸出開始日 <span class="required">*</span></label>
                    <input type="date" id="startDate" name="startDate">
                </div>
                
                <div class="form-group" id="endDateGroup">
                    <label for="endDate" data-lang-ja="返却予定日" data-lang-en="Return Date">返却予定日 <span class="required">*</span></label>
                    <input type="date" id="endDate" name="endDate">
                    <p class="info-text" data-lang-ja="利用期間は最大3ヶ月です" data-lang-en="Maximum rental period is 3 months">利用期間は最大3ヶ月です</p>
                </div>
                
                <div class="button-group">
                    <button type="button" class="btn btn-prev" id="prevBtn3" data-lang-ja="戻る" data-lang-en="Back">戻る</button>
                    <button type="button" class="btn btn-next" id="nextBtn3" data-lang-ja="次へ" data-lang-en="Next">次へ</button>
                </div>
            </div>
            
            <!-- Step 4: Confirmation -->
            <div class="form-step" data-step="4">
                <div class="equipment-section">
                    <h3 data-lang-ja="📋 予約内容の確認" data-lang-en="📋 Confirmation">📋 予約内容の確認</h3>
                    <div id="confirmationContent"></div>
                </div>
                
                <div class="button-group">
                    <button type="button" class="btn btn-prev" id="prevBtn4" data-lang-ja="戻る" data-lang-en="Back">戻る</button>
                    <button type="submit" class="btn btn-submit" data-lang-ja="予約を送信" data-lang-en="Submit">予約を送信</button>
                </div>
            </div>
        </form>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            'use strict';
            
            // API Base URL
            const API_BASE_URL = 'https://qqu1ilmtn9.execute-api.ap-northeast-1.amazonaws.com/prod';
            
            let currentStep = 1;
            let nonAmazonCount = 0;
            let amazonCount = 0;
            let monitorCount = 0;
            let currentLanguage = 'ja';
            const MAX_TOTAL_LAPTOPS = 20;
            const MAX_MONITORS = 10;
            const MAX_RENTAL_DAYS = 90;
            
            // 在庫管理データ（APIから読み込み）
            async function getInventoryData() {
                try {
                    const response = await fetch(`${API_BASE_URL}/inventory`);
                    if (!response.ok) {
                        throw new Error('在庫データの取得に失敗しました');
                    }
                    const inventoryList = await response.json();
                    
                    // APIレスポンスをグループ化して既存の形式に変換
                    const inventory = {};
                    inventoryList.forEach(item => {
                        if (!inventory[item.site]) {
                            inventory[item.site] = {};
                        }
                        
                        // equipment_typeを表示名に変換
                        const displayName = item.equipment_type === 'non_amazon_pc' ? 'Non-Amazon PC' :
                                           item.equipment_type === 'amazon_pc' ? 'Amazon PC' :
                                           item.equipment_type === 'monitor' ? 'Monitor' : item.equipment_type;
                        
                        inventory[item.site][displayName] = {
                            total: item.total_quantity,
                            available: item.available_quantity
                        };
                    });
                    
                    return inventory;
                } catch (error) {
                    console.error('在庫データ取得エラー:', error);
                    alert('在庫データの取得に失敗しました: ' + error.message);
                    return {};
                }
            }
            
            function saveInventoryData(inventoryData) {
                // 在庫データはAPIで管理されるため、この関数は不要
                console.log('saveInventoryData called (no-op in API mode)');
            }
            
            // 予約データ管理
            async function getReservations() {
                try {
                    const response = await fetch(`${API_BASE_URL}/reservations`);
                    if (!response.ok) {
                        throw new Error('予約データの取得に失敗しました');
                    }
                    return await response.json();
                } catch (error) {
                    console.error('予約データ取得エラー:', error);
                    return [];
                }
            }
            
            async function saveReservation(reservationData) {
                try {
                    const response = await fetch(`${API_BASE_URL}/reservations`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(reservationData)
                    });
                    
                    if (!response.ok) {
                        throw new Error('予約の保存に失敗しました');
                    }
                    
                    return await response.json();
                } catch (error) {
                    console.error('予約保存エラー:', error);
                    throw error;
                }
            }
            
            async function updateReservationStatus(reservationId, status) {
                try {
                    const response = await fetch(`${API_BASE_URL}/reservations/${reservationId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ status })
                    });
                    
                    if (!response.ok) {
                        throw new Error('予約ステータスの更新に失敗しました');
                    }
                    
                    return await response.json();
                } catch (error) {
                    console.error('予約ステータス更新エラー:', error);
                    throw error;
                }
            }
            
            // 個別機器データ管理
            async function getEquipmentData() {
                try {
                    const response = await fetch(`${API_BASE_URL}/equipment`);
                    if (!response.ok) {
                        throw new Error('機器データの取得に失敗しました');
                    }
                    const equipmentList = await response.json();
                    
                    // APIレスポンスを既存の形式に変換
                    return equipmentList.map(item => ({
                        code: item.equipment_code,
                        type: item.equipment_type === 'non_amazon_pc' ? 'Non-Amazon PC' :
                              item.equipment_type === 'amazon_pc' ? 'Amazon PC' :
                              item.equipment_type === 'monitor' ? 'Monitor' : item.equipment_type,
                        site: item.site,
                        status: item.status,
                        currentUser: item.current_user_alias,
                        model: item.model_name || 'N/A',
                        serialNumber: item.serial_number || 'N/A'
                    }));
                } catch (error) {
                    console.error('機器データ取得エラー:', error);
                    return [];
                }
            }
            
            function initializeEquipmentData() {
                // APIモードでは不要
                return [];
            }
            
            function saveEquipmentData(equipmentData) {
                // 機器データはAPIで管理されるため、この関数は不要
                console.log('saveEquipmentData called (no-op in API mode)');
            }
            
            // 個別機器を予約に割り当て
            async function assignEquipmentToReservation(site, nonAmazonCount, amazonCount, monitorCount, userAlias) {
                try {
                    const equipmentList = await getEquipmentData();
                    const assigned = [];
                    
                    // Non-Amazon PCを割り当て
                    const availableNonAmazon = equipmentList.filter(eq => 
                        eq.site === site && 
                        eq.type === 'Non-Amazon PC' && 
                        eq.status === 'available'
                    );
                    for (let i = 0; i < nonAmazonCount && i < availableNonAmazon.length; i++) {
                        const code = availableNonAmazon[i].code;
                        await updateEquipmentStatus(code, 'in_use', userAlias);
                        assigned.push(code);
                    }
                    
                    // Amazon PCを割り当て
                    const availableAmazon = equipmentList.filter(eq => 
                        eq.site === site && 
                        eq.type === 'Amazon PC' && 
                        eq.status === 'available'
                    );
                    for (let i = 0; i < amazonCount && i < availableAmazon.length; i++) {
                        const code = availableAmazon[i].code;
                        await updateEquipmentStatus(code, 'in_use', userAlias);
                        assigned.push(code);
                    }
                    
                    // Monitorを割り当て
                    const availableMonitors = equipmentList.filter(eq => 
                        eq.site === site && 
                        eq.type === 'Monitor' && 
                        eq.status === 'available'
                    );
                    for (let i = 0; i < monitorCount && i < availableMonitors.length; i++) {
                        const code = availableMonitors[i].code;
                        await updateEquipmentStatus(code, 'in_use', userAlias);
                        assigned.push(code);
                    }
                    
                    return assigned;
                } catch (error) {
                    console.error('機器割り当てエラー:', error);
                    return [];
                }
            }
            
            async function updateEquipmentStatus(code, status, userAlias = null) {
                try {
                    const response = await fetch(`${API_BASE_URL}/equipment/${code}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            status: status,
                            current_user_alias: userAlias
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error('機器ステータスの更新に失敗しました');
                    }
                    
                    return await response.json();
                } catch (error) {
                    console.error('機器ステータス更新エラー:', error);
                    throw error;
                }
            }
            
            let inventory = {};
            
            // 初期データをロード
            async function initializeInventory() {
                inventory = await getInventoryData();
            }
            
            // ページロード時にデータを取得
            initializeInventory();
            
            // メール通知機能
            function showEmailNotification(reservationData, successMsg) {
                // 既存のアラートを非表示にして、カスタムモーダルを表示
                const emailModal = createEmailModal(reservationData, successMsg);
                document.body.appendChild(emailModal);
            }
            
            function createEmailModal(reservationData, successMsg) {
                const modal = document.createElement('div');
                modal.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0, 0, 0, 0.8);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 10000;
                `;
                
                const emailContent = generateEmailContent(reservationData);
                
                modal.innerHTML = `
                    <div style="
                        background: white;
                        border-radius: 15px;
                        padding: 30px;
                        max-width: 600px;
                        width: 90%;
                        max-height: 80vh;
                        overflow-y: auto;
                        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                    ">
                        <h2 style="color: #2c3e50; margin-bottom: 20px; text-align: center;">
                            📧 予約確認メール
                        </h2>
                        
                        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                            <p style="color: #27ae60; font-weight: bold; margin: 0;">
                                ${successMsg.split('\\n')[0]}
                            </p>
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; margin-bottom: 10px; font-weight: bold; color: #2c3e50;">

            // 在庫確認機能
            function checkInventoryAvailability(siteId, nonAmazonCount, amazonCount, monitorCount) {
                if (!inventory || !inventory[siteId]) return { available: true }; // 在庫データがない場合はスキップ
                
                const site = inventory[siteId];
                const checks = [
                    { type: 'Non-Amazon PC', requested: nonAmazonCount, available: site['Non-Amazon PC']?.available || 0 },
                    { type: 'Amazon PC', requested: amazonCount, available: site['Amazon PC']?.available || 0 },
                    { type: 'Monitor', requested: monitorCount, available: site['Monitor']?.available || 0 }
                ];
                
                for (let check of checks) {
                    if (check.requested > check.available) {
                        return { 
                            available: false, 
                            reason: `${check.type}の在庫不足 (要求: ${check.requested}, 利用可能: ${check.available})`,
                            shortage: { type: check.type, requested: check.requested, available: check.available }
                        };
                    }
                }
                
                return { available: true };
            }
            
            // 代替案提案機能
            function suggestAlternatives(originalSite, nonAmazonCount, amazonCount, monitorCount) {
                const alternatives = [];
                
                if (!inventory || Object.keys(inventory).length === 0) return alternatives;
                
                for (let siteId in inventory) {
                    if (siteId === originalSite) continue;
                    
                    const availability = checkInventoryAvailability(siteId, nonAmazonCount, amazonCount, monitorCount);
                    if (availability.available) {
                        alternatives.push({
                            site: siteId,
                            message: `${siteId}では全ての機器が利用可能です`
                        });
                    }
                }
                
                return alternatives;
            }

                        <h4 style="color: #ffffff; margin-bottom: 10px;">📦 ${siteId} 在庫状況</h4>
                        <div style="color: rgba(255,255,255,0.9); font-size: 13px;">

                            • Amazon PC: ${site['Amazon PC'].available}/${site['Amazon PC'].total}台<br>
                            • モニター: ${site['Monitor'].available}/${site['Monitor'].total}台
                        </div>

            }

                    formStep.classList.remove('active');

                const targetStep = document.querySelector('.form-step[data-step="' + step + '"]');
                if (targetStep) {
                    targetStep.classList.add('active');
                }
                
                currentStep = step;
                updateProgressBar();
                hideError();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
            
            function validateStep(step) {
                console.log('validateStep called for step:', step);
                hideError();
                
                if (step === 1) {
                    console.log('Validating step 1');
                    console.log('aliasInput exists:', !!aliasInput);
                    console.log('aliasInput value:', aliasInput ? aliasInput.value : 'N/A');
                    console.log('pickupSiteSelect exists:', !!pickupSiteSelect);
                    console.log('pickupSiteSelect value:', pickupSiteSelect ? pickupSiteSelect.value : 'N/A');
                    
                    if (!aliasInput || !aliasInput.value.trim()) {

                    if (!pickupSiteSelect || !pickupSiteSelect.value) {
                        console.log('Pickup site validation failed');
                        showError('pickupSiteRequired', pickupSiteGroup);
                        return false;
                    }
                    
                    console.log('Step 1 validation passed');
                }
                
                if (step === 2) {
                    const totalLaptops = nonAmazonCount + amazonCount;
                    
                    if (totalLaptops === 0 && monitorCount === 0) {
                        showError('equipmentRequired');
                        return false;
                    }
                    
                    // 在庫確認（inventoryが読み込まれている場合のみ）
                    const selectedSite = pickupSiteSelect.value;
                    if (selectedSite && inventory && Object.keys(inventory).length > 0) {
                        const availability = checkInventoryAvailability(selectedSite, nonAmazonCount, amazonCount, monitorCount);
                        if (!availability.available) {
                            // 代替案を提案
                            const alternatives = suggestAlternatives(selectedSite, nonAmazonCount, amazonCount, monitorCount);
                            let errorMsg = availability.reason;
                            
                            if (alternatives.length > 0) {
                                errorMsg += '\n\n代替案:';
                                alternatives.forEach(alt => {
                                    errorMsg += `\n• ${alt.message}`;
                                });
                            } else {
                                errorMsg += '\n\n申し訳ございませんが、現在どのサイトでも在庫が不足しています。';
                            }
                            
                            alert(errorMsg);
                            return false;
                        }
                    }
                }
                
                if (step === 3) {
                    if (!startDateInput.value) {
                        showError('startDateRequired', startDateGroup);
                        return false;
                    }
                    
                    if (!endDateInput.value) {
                        showError('endDateRequired', endDateGroup);
                        return false;

                        return false;

                }
                
                return true;

            // フォーム送信処理
            document.getElementById('reservationForm').addEventListener('submit', async function(e) {
                e.preventDefault();

                const startDate = new Date(startDateInput.value);
                const endDate = new Date(endDateInput.value);
                const daysDiff = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24));
                const rentalDays = daysDiff === 0 ? 1 : daysDiff; // 同じ日の場合は1日間として扱う

                const formData = {
                    alias: aliasInput.value,
                    pickupSite: pickupSiteSelect.value,
                    nonAmazonPC: nonAmazonCount,
                    amazonPC: amazonCount,
                    monitors: monitorCount,
                    startDate: startDateInput.value,
                    endDate: endDateInput.value,
                    rentalDays: rentalDays
                };

                try {
                    // APIで予約を作成（自動機器割り当て含む）
                    const equipment = [];
                    if (formData.nonAmazonPC > 0) {
                        equipment.push({ type: 'non_amazon_pc', quantity: formData.nonAmazonPC });
                    }
                    if (formData.amazonPC > 0) {
                        equipment.push({ type: 'amazon_pc', quantity: formData.amazonPC });
                    }
                    if (formData.monitors > 0) {
                        equipment.push({ type: 'monitor', quantity: formData.monitors });
                    }

                    const reservationResponse = await fetch(`${API_BASE_URL}/reservations`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            user_alias: formData.alias,
                            pickup_site: formData.pickupSite,
                            start_date: formData.startDate,
                            end_date: formData.endDate,
                            equipment: equipment
                        })
                    });

                    if (!reservationResponse.ok) {
                        const error = await reservationResponse.json();
                        if (error.error && error.error.includes('Insufficient inventory')) {
                            throw new Error('在庫が不足しています。数量を減らすか、別のサイトをお試しください。');
                        } else if (error.error && error.error.includes('Modification deadline')) {
                            throw new Error(error.message || '変更期限を過ぎています。IT窓口までお越しください。');
                        }
                        throw new Error(error.error || '予約の作成に失敗しました');
                    }

                    const reservationData = await reservationResponse.json();
                    const reservationId = reservationData.booking_code || reservationData.id;
                    const allocatedEquipment = reservationData.allocated_equipment || [];
                    
                    formData.reservationId = reservationId;
                    formData.allocatedEquipment = allocatedEquipment;

                    // メール送信処理
                    const emailContent = generateEmailContent(formData);
                    const emailData = {
                        to: formData.alias + '@amazon.co.jp',
                        subject: '【Loaner機器予約システム】予約確認 - ' + reservationId,
                        message: emailContent,
                        reservationData: formData
                    };

                    // ローディング表示
                    const loadingDiv = document.createElement('div');
                    loadingDiv.id = 'loadingMessage';
                    loadingDiv.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.8); color: white; padding: 20px 40px; border-radius: 10px; z-index: 10001; font-size: 16px;';
                    loadingDiv.textContent = 'メールを送信中...';
                    document.body.appendChild(loadingDiv);

                    // API Gatewayを呼び出してメール送信
                    const response = await fetch('https://8ah123if48.execute-api.ap-northeast-1.amazonaws.com/send-email', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(emailData)
                    });

                    // ローディング非表示
                    const loading = document.getElementById('loadingMessage');
                    if (loading) {
                        loading.remove();
                    }

                    if (response.ok) {
                        const result = await response.json();
                        console.log('Email sent successfully:', result);

                        let successMsg = '予約が完了しました！\n\n';
                        successMsg += '予約ID: ' + reservationId + '\n\n';
                        successMsg += '予約内容:\n';
                        successMsg += '• サイト: ' + formData.pickupSite + '\n';
                        successMsg += '• 期間: ' + formData.startDate + ' ～ ' + formData.endDate + '\n';
                        successMsg += '• 機器: ';
                        const items = [];
                        if (formData.nonAmazonPC > 0) items.push('Non-Amazon PC ' + formData.nonAmazonPC + '台');
                        if (formData.amazonPC > 0) items.push('Amazon PC ' + formData.amazonPC + '台');
                        if (formData.monitors > 0) items.push('モニター ' + formData.monitors + '台');
                        successMsg += items.join(', ') + '\n';
                        if (allocatedEquipment.length > 0) {
                            successMsg += '\n割り当てられた機器:\n';
                            allocatedEquipment.forEach(eq => {
                                const displayName = formatEquipmentDisplayName(eq.equipment_code);
                                successMsg += '• ' + displayName + '\n';
                            });
                        }
                        successMsg += '\n✅ 確認メールを ' + formData.alias + '@amazon.co.jp に送信しました。';
                        successMsg += '\n\n⚠️ 予約の変更・キャンセルは利用開始日の前日 午前9時まで可能です。';
                        successMsg += '\nそれ以降の変更はIT窓口までお越しください。';

                        alert(successMsg);

                        // フォームをリセット
                        location.reload();
                    } else {
                        const error = await response.json();
                        console.error('Email sending failed:', error);
                        alert('予約は完了しましたが、メール送信に失敗しました。\n\n予約ID: ' + reservationId + '\n\n手動で確認メールを送信してください。');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('予約処理中にエラーが発生しました: ' + error.message);
                }
            });

            // 日付の初期設定
            const today = new Date().toISOString().split('T')[0];
            startDateInput.setAttribute('min', today);
            endDateInput.setAttribute('min', today);

            startDateInput.addEventListener('change', function() {
                const startDate = new Date(this.value);
                endDateInput.setAttribute('min', this.value);

                const maxDate = new Date(startDate);
                maxDate.setDate(maxDate.getDate() + MAX_RENTAL_DAYS);
                endDateInput.setAttribute('max', maxDate.toISOString().split('T')[0]);
            });
            
            // デバッグ用 - DOM要素の確認
            console.log('Script loaded successfully');
            console.log('nextStep function defined:', typeof window.nextStep);
            console.log('prevStep function defined:', typeof window.prevStep);
            console.log('aliasInput element:', aliasInput);
            console.log('pickupSiteSelect element:', pickupSiteSelect);
            console.log('errorMessage element:', errorMessage);
            
            // ボタンにイベントリスナーを設定
            const nextBtn1 = document.getElementById('nextBtn1');
            const nextBtn2 = document.getElementById('nextBtn2');
            const nextBtn3 = document.getElementById('nextBtn3');
            const prevBtn2 = document.getElementById('prevBtn2');
            const prevBtn3 = document.getElementById('prevBtn3');
            const prevBtn4 = document.getElementById('prevBtn4');
            
            console.log('Setting up button event listeners');
            console.log('nextBtn1:', nextBtn1);
            console.log('nextBtn2:', nextBtn2);
            console.log('nextBtn3:', nextBtn3);
            
            if (nextBtn1) {
                nextBtn1.addEventListener('click', function(e) {
                    console.log('Next button 1 clicked');
                    nextStep();
                });
            }
            
            if (nextBtn2) {
                nextBtn2.addEventListener('click', function(e) {
                    console.log('Next button 2 clicked');
                    nextStep();
                });
            }
            
            if (nextBtn3) {
                nextBtn3.addEventListener('click', function(e) {
                    console.log('Next button 3 clicked');
                    nextStep();
                });
            }
            
            if (prevBtn2) {
                prevBtn2.addEventListener('click', function(e) {
                    console.log('Prev button 2 clicked');
                    prevStep();
                });
            }
            
            if (prevBtn3) {
                prevBtn3.addEventListener('click', function(e) {
                    console.log('Prev button 3 clicked');
                    prevStep();
                });
            }
            
            if (prevBtn4) {
                prevBtn4.addEventListener('click', function(e) {
                    console.log('Prev button 4 clicked');
                    prevStep();
                });
            }
        });
    </script>
    </div>
</body>
</html>
