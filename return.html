<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>返却管理 - Loaner機器予約システム</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Amazon Ember', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #EAEDED;
            min-height: 100vh;
            padding: 0;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #FFFFFF;
            border-radius: 8px;
            border: 1px solid #DDD;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        
        h1 {
            color: #232F3E;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 700;
        }
        
        .search-section {
            background: #F7F8FA;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #DDD;
        }
        
        .search-input {
            width: 100%;
            padding: 15px;
            background: #FFFFFF;
            border: 1px solid #888;
            border-radius: 4px;
            color: #111;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .search-input::placeholder {
            color: #888;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #FF9900;
            box-shadow: 0 0 3px rgba(255, 153, 0, 0.5);
        }
        
        .search-btn {
            padding: 12px 25px;
            background: #FF9900;
            color: #111;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            margin-right: 10px;
        }
        
        .search-btn:hover {
            opacity: 0.9;
        }
        
        .reservation-card {
            background: #FFFFFF;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #DDD;
        }
        
        .reservation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .reservation-id {
            color: #232F3E;
            font-size: 18px;
            font-weight: 600;
        }
        
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-active {
            background: #E8F0FE;
            color: #1A73E8;
        }
        
        .status-returned {
            background: #E6F4F0;
            color: #067D62;
        }
        
        .reservation-details {
            color: #232F3E;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .return-btn {
            padding: 10px 20px;
            background: #FF9900;
            color: #111;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .return-btn:hover {
            opacity: 0.9;
        }
        
        .return-btn:disabled {
            background: #E7E9EC;
            color: #888;
            cursor: not-allowed;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #E7E9EC;
            color: #111;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            background: #D5D9DB;
        }
        
        .no-reservations {
            text-align: center;
            color: #888;
            padding: 40px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div style="background: #232F3E; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0;">
        <div style="color: #FF9900; font-size: 20px; font-weight: 700;">🔄 返却管理</div>
        <div style="display: flex; gap: 15px;">
            <a href="index.html" style="color: #fff; text-decoration: none; font-size: 14px;">🖥️ 予約システム</a>
            <a href="admin.html" style="color: #fff; text-decoration: none; font-size: 14px;">🛠️ 管理画面</a>
        </div>
    </div>
    
    <div style="padding: 20px;">
    <div class="container">
        <h1>🔄 返却管理システム</h1>
        
        <div class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="予約ID、Alias、またはサイト名で検索...">
            <button class="search-btn" onclick="searchReservations()">🔍 検索</button>
            <button class="search-btn" onclick="showAllReservations()">📋 全て表示</button>
        </div>
        
        <div id="reservationsContainer"></div>
        
        <a href="index.html" class="back-link">← 予約システムに戻る</a>
        <a href="admin.html" class="back-link">🛠️ 管理画面</a>
    </div>
    </div>
    
    <script>
        // API Base URL
        const API_BASE_URL = 'https://qqu1ilmtn9.execute-api.ap-northeast-1.amazonaws.com/prod';
        
        // APIから在庫データと予約データを取得
        async function getInventoryData() {
            try {
                const response = await fetch(`${API_BASE_URL}/inventory`);
                if (!response.ok) {
                    throw new Error('在庫データの取得に失敗しました');
                }
                const inventoryList = await response.json();
                
                // APIレスポンスをグループ化して既存の形式に変換
                const inventory = {};
                inventoryList.forEach(item => {
                    if (!inventory[item.site]) {
                        inventory[item.site] = {};
                    }
                    
                    // equipment_typeを表示名に変換
                    const displayName = item.equipment_type === 'non_amazon_pc' ? 'Non-Amazon PC' :
                                       item.equipment_type === 'amazon_pc' ? 'Amazon PC' :
                                       item.equipment_type === 'monitor' ? 'Monitor' : item.equipment_type;
                    
                    inventory[item.site][displayName] = {
                        total: item.total_quantity,
                        available: item.available_quantity
                    };
                });
                
                return inventory;
            } catch (error) {
                console.error('在庫データ取得エラー:', error);
                return {};
            }
        }
        
        async function saveInventoryData(inventoryData) {
            // 在庫データはAPIで管理されるため、この関数は不要
            console.log('saveInventoryData called (no-op in API mode)');
        }
        
        async function getReservations() {
            try {
                const response = await fetch(`${API_BASE_URL}/reservations`);
                if (!response.ok) {
                    throw new Error('予約データの取得に失敗しました');
                }
                return await response.json();
            } catch (error) {
                console.error('予約データ取得エラー:', error);
                return [];
            }
        }
        
        async function updateReservationStatus(reservationId, status) {
            try {
                const response = await fetch(`${API_BASE_URL}/reservations/${reservationId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        status,
                        returnedAt: new Date().toISOString()
                    })
                });
                
                if (!response.ok) {
                    throw new Error('予約ステータスの更新に失敗しました');
                }
                
                return await response.json();
            } catch (error) {
                console.error('予約ステータス更新エラー:', error);
                throw error;
            }
        }
        
        async function returnEquipment(reservationId) {
            const reservations = await getReservations();
            const reservation = reservations.find(r => r.id === reservationId);
            
            if (!reservation || reservation.status === 'returned' || reservation.status === 'cancelled') {
                alert('予約が見つからないか、既に返却済み/キャンセル済みです。');
                return;
            }
            
            // 確認ダイアログ
            const equipmentCounts = { amazon_pc: 0, non_amazon_pc: 0, monitor: 0 };
            if (reservation.equipment && Array.isArray(reservation.equipment)) {
                reservation.equipment.forEach(eq => {
                    if (eq.equipment_type) {
                        equipmentCounts[eq.equipment_type] = eq.quantity || 0;
                    }
                });
            }
            
            const confirmMsg = `以下の機器を返却しますか？\n\n` +
                `予約ID: ${reservation.booking_code || reservation.id.substring(0,8)}\n` +
                `サイト: ${reservation.pickup_site}\n` +
                `Non-Amazon PC: ${equipmentCounts.non_amazon_pc}台\n` +
                `Amazon PC: ${equipmentCounts.amazon_pc}台\n` +
                `モニター: ${equipmentCounts.monitor}台`;
            
            if (!confirm(confirmMsg)) {
                return;
            }
            
            try {
                // 返却APIで返却処理（機器解放と在庫復旧を含む）
                const response = await fetch(`${API_BASE_URL}/reservations/${reservationId}/return`, {
                    method: 'POST'
                });
                
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || '返却処理に失敗しました');
                }
                
                alert('返却処理が完了しました！');
                
                // 表示を更新
                showAllReservations();
            } catch (error) {
                console.error('返却処理エラー:', error);
                alert('返却処理に失敗しました: ' + error.message);
            }
        }
        
        async function updateEquipmentStatus(code, status, userAlias = null) {
            try {
                const response = await fetch(`${API_BASE_URL}/equipment/${code}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        status: status,
                        current_user_alias: userAlias
                    })
                });
                
                if (!response.ok) {
                    throw new Error('機器ステータスの更新に失敗しました');
                }
                
                return await response.json();
            } catch (error) {
                console.error('機器ステータス更新エラー:', error);
                throw error;
            }
        }
        
        async function renderReservations(reservations) {
            const container = document.getElementById('reservationsContainer');
            
            if (reservations.length === 0) {
                container.innerHTML = '<div class="no-reservations">予約データが見つかりません。</div>';
                return;
            }
            
            let html = '';
            
            for (const reservation of reservations) {
                const createdDate = new Date(reservation.created_at).toLocaleDateString('ja-JP');
                const returnedDate = reservation.returnedAt ? 
                    new Date(reservation.returnedAt).toLocaleDateString('ja-JP') : '';
                
                // 予約詳細を取得して機器情報を含める
                let equipmentHtml = '';
                try {
                    const detailResponse = await fetch(`${API_BASE_URL}/reservations/${reservation.id}`);
                    if (detailResponse.ok) {
                        const detail = await detailResponse.json();
                        if (detail.allocated_equipment && detail.allocated_equipment.length > 0) {
                            equipmentHtml = '<br><strong>🔧 割り当てられた機器:</strong><br>';
                            detail.allocated_equipment.forEach(eq => {
                                const typeLabel = eq.type === 'amazon_pc' ? 'Amazon PC' : 
                                                 eq.type === 'non_amazon_pc' ? 'Non-Amazon PC' : 'Monitor';
                                equipmentHtml += `&nbsp;&nbsp;• ${eq.equipment_code} (${typeLabel})<br>`;
                            });
                        }
                    }
                } catch (error) {
                    console.error('機器情報取得エラー:', error);
                }
                
                // 機器数を計算
                let equipmentCounts = { amazon_pc: 0, non_amazon_pc: 0, monitor: 0 };
                if (reservation.equipment && Array.isArray(reservation.equipment)) {
                    reservation.equipment.forEach(eq => {
                        if (eq.equipment_type) {
                            equipmentCounts[eq.equipment_type] = eq.quantity || 0;
                        }
                    });
                }
                
                html += `
                    <div class="reservation-card">
                        <div class="reservation-header">
                            <div class="reservation-id">${reservation.booking_code || reservation.id.substring(0,8)}</div>
                            <div class="status-badge ${reservation.status === 'returned' ? 'status-returned' : 'status-active'}">
                                ${reservation.status === 'returned' ? '返却済み' : 
                                  reservation.status === 'cancelled' ? 'キャンセル済み' : '利用中'}
                            </div>
                        </div>
                        <div class="reservation-details">
                            <strong>👤 利用者:</strong> ${reservation.user_alias}<br>
                            <strong>📍 サイト:</strong> ${reservation.pickup_site}<br>
                            <strong>📅 期間:</strong> ${reservation.start_date.split('T')[0]} ～ ${reservation.end_date.split('T')[0]}<br>
                            <strong>💻 機器:</strong> Non-Amazon PC ${equipmentCounts.non_amazon_pc}台, Amazon PC ${equipmentCounts.amazon_pc}台, モニター ${equipmentCounts.monitor}台<br>
                            <strong>📝 予約日:</strong> ${createdDate}
                            ${returnedDate ? `<br><strong>🔄 返却日:</strong> ${returnedDate}` : ''}
                            ${equipmentHtml}
                        </div>
                        ${reservation.status === 'pending' || reservation.status === 'confirmed' || reservation.status === 'setup_complete' ? 
                            `<button class="return-btn" onclick="returnEquipment('${reservation.id}')">🔄 返却処理</button>` :
                            reservation.status === 'cancelled' ?
                            `<button class="return-btn" disabled>キャンセル済み</button>` :
                            `<button class="return-btn" disabled>返却済み</button>`
                        }
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        async function searchReservations() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            const allReservations = await getReservations();
            
            if (!searchTerm) {
                showAllReservations();
                return;
            }
            
            const filteredReservations = allReservations.filter(reservation => 
                reservation.id.toLowerCase().includes(searchTerm) ||
                reservation.user_alias.toLowerCase().includes(searchTerm) ||
                reservation.pickup_site.toLowerCase().includes(searchTerm)
            );
            
            await renderReservations(filteredReservations);
        }
        
        async function showAllReservations() {
            const allReservations = await getReservations();
            // 新しい順にソート
            allReservations.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            await renderReservations(allReservations);
        }
        
        // 初期表示
        showAllReservations();
        
        // Enterキーで検索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchReservations();
            }
        });
        
        // 返却完了メール通知機能
        function showReturnEmailNotification(reservation) {
            const modal = createReturnEmailModal(reservation);
            document.body.appendChild(modal);
        }
        
        function createReturnEmailModal(reservation) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10000;
            `;
            
            const emailContent = generateReturnEmailContent(reservation);
            
            modal.innerHTML = `
                <div style="
                    background: white;
                    border-radius: 15px;
                    padding: 30px;
                    max-width: 600px;
                    width: 90%;
                    max-height: 80vh;
                    overflow-y: auto;
                    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                ">
                    <h2 style="color: #27ae60; margin-bottom: 20px; text-align: center;">
                        ✅ 返却完了通知メール
                    </h2>
                    
                    <div style="background: #d4edda; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #27ae60;">
                        <p style="color: #155724; font-weight: bold; margin: 0;">
                            返却処理が完了しました！在庫が復旧されました。
                        </p>
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 10px; font-weight: bold; color: #2c3e50;">
                            📧 送信先メールアドレス:
                        </label>
                        <input type="email" id="returnEmailAddress" 
                               value="${reservation.alias}@amazon.co.jp"
                               style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 10px; font-weight: bold; color: #2c3e50;">
                            📝 メール内容:
                        </label>
                        <textarea id="returnEmailContent" rows="10" style="
                            width: 100%; 
                            padding: 15px; 
                            border: 1px solid #ddd; 
                            border-radius: 5px; 
                            font-family: monospace; 
                            font-size: 13px;
                            resize: vertical;
                        ">${emailContent}</textarea>
                    </div>
                    
                    <div style="display: flex; gap: 15px; justify-content: center;">
                        <button onclick="copyReturnEmailContent()" style="
                            padding: 12px 25px;
                            background: #232F3E;
                            color: white;
                            border: none;
                            border-radius: 4px;
                            cursor: pointer;
                            font-weight: 500;
                        ">📋 コピー</button>
                        
                        <button onclick="openReturnEmailClient('${reservation.alias}@amazon.co.jp')" style="
                            padding: 12px 25px;
                            background: #FF9900;
                            color: #111;
                            border: none;
                            border-radius: 4px;
                            cursor: pointer;
                            font-weight: 500;
                        ">📧 メール送信</button>
                        
                        <button onclick="closeReturnEmailModal()" style="
                            padding: 12px 25px;
                            background: #E7E9EC;
                            color: #111;
                            border: none;
                            border-radius: 4px;
                            cursor: pointer;
                            font-weight: 500;
                        ">✕ 閉じる</button>
                    </div>
                </div>
            `;
            
            return modal;
        }
        
        function generateReturnEmailContent(reservation) {
            const returnDate = new Date().toLocaleDateString('ja-JP');
            
            // Pickup Station の場所情報を取得
            function getPickupStationInfo(siteId) {
                const stationInfo = {
                    'HND10': {
                        name: 'HND10',
                        location: 'HND10オフィス 1F ITサポートデスク',
                        contact: 'HND10-IT@amazon.co.jp'
                    },
                    'HND11': {
                        name: 'HND11',
                        location: 'HND11オフィス 2F ITサポートデスク',
                        contact: 'HND11-IT@amazon.co.jp'
                    },
                    'HND17': {
                        name: 'HND17',
                        location: 'HND17オフィス 1F ITサポートデスク',
                        contact: 'HND17-IT@amazon.co.jp'
                    },
                    'HND21': {
                        name: 'HND21',
                        location: 'HND21オフィス 1F 受付',
                        contact: 'HND21-IT@amazon.co.jp'
                    }
                };
                return stationInfo[siteId] || {
                    name: siteId,
                    location: '詳細はITチームまでお問い合わせください',
                    contact: 'IT-Support@amazon.co.jp'
                };
            }
            
            const stationInfo = getPickupStationInfo(reservation.pickupSite);
            
            return `件名: 【Loaner機器予約システム】返却完了確認 - ${reservation.reservationId}

${reservation.alias} 様

いつもお疲れ様です。
Loaner機器予約システムより、返却完了のご連絡です。

■ 返却詳細
予約ID: ${reservation.reservationId}
利用者: ${reservation.alias}
受取サイト: ${stationInfo.name}
利用期間: ${reservation.startDate} ～ ${reservation.endDate}

■ 返却機器
${reservation.nonAmazonPC > 0 ? `・Non-Amazon PC: ${reservation.nonAmazonPC}台\n` : ''}${reservation.amazonPC > 0 ? `・Amazon PC: ${reservation.amazonPC}台\n` : ''}${reservation.monitors > 0 ? `・モニター: ${reservation.monitors}台\n` : ''}
■ 返却完了
返却日時: ${returnDate}
返却場所: ${stationInfo.location}
ステータス: 返却完了

機器の返却処理が正常に完了いたしました。
ご利用いただき、ありがとうございました。

■ 今後のご利用について
次回のご利用時も、同じPickup Stationをご利用いただけます。
場所: ${stationInfo.location}
連絡先: ${stationInfo.contact}

■ お問い合わせ
ご不明な点がございましたら、下記までお気軽にお声がけください：
・返却場所: ${stationInfo.contact}
・ITチーム: IT-Support@amazon.co.jp

---
Loaner機器予約システム
ITチーム`;
        }
        
        // グローバル関数として定義
        window.copyReturnEmailContent = function() {
            const emailContent = document.getElementById('returnEmailContent');
            emailContent.select();
            document.execCommand('copy');
            alert('メール内容をクリップボードにコピーしました！');
        };
        
        window.openReturnEmailClient = function(defaultEmail) {
            const emailAddress = document.getElementById('returnEmailAddress').value || defaultEmail;
            const emailContent = document.getElementById('returnEmailContent').value;
            const subject = emailContent.split('\\n')[0].replace('件名: ', '');
            const body = emailContent.split('\\n').slice(2).join('\\n');
            
            const mailtoLink = `mailto:${emailAddress}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            window.open(mailtoLink);
        };
        
        window.closeReturnEmailModal = function() {
            const modal = document.querySelector('div[style*="position: fixed"]');
            if (modal) {
                modal.remove();
            }
        };
    </script>
</body>
</html>
