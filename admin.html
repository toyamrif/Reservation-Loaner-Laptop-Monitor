<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在庫管理 - 管理画面</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }
        
        h1 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 700;
        }
        
        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .nav-btn:hover, .nav-btn.active {
            background: rgba(52, 152, 219, 0.8);
        }
        
        .section {
            display: none;
        }
        
        .section.active {
            display: block;
        }
        
        .site-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .equipment-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        @media (max-width: 768px) {
            .equipment-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .site-title {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .equipment-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        
        .equipment-name {
            color: #ffffff;
            font-weight: 500;
        }
        
        .equipment-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .inventory-input {
            width: 60px;
            padding: 5px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            color: white;
            text-align: center;
        }
        
        .update-btn {
            padding: 5px 15px;
            background: rgba(46, 204, 113, 0.8);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .update-btn:hover {
            background: rgba(46, 204, 113, 1);
        }
        
        .equipment-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 0;
            border-left: 3px solid;
        }
        
        .equipment-card.available {
            border-left-color: #2ecc71;
        }
        
        .equipment-card.in_use {
            border-left-color: #e74c3c;
        }
        
        .equipment-card.maintenance {
            border-left-color: #f39c12;
        }
        
        .equipment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .equipment-code {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }
        
        .status-badge {
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .status-badge.available {
            background: rgba(46, 204, 113, 0.3);
            color: #2ecc71;
        }
        
        .status-badge.in_use {
            background: rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }
        
        .status-badge.maintenance {
            background: rgba(243, 156, 18, 0.3);
            color: #f39c12;
        }
        
        .equipment-details {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            line-height: 1.5;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 10px;
        }
        
        .user-tag {
            display: inline-block;
            padding: 4px 10px;
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.4), rgba(41, 128, 185, 0.4));
            border: 1px solid rgba(52, 152, 219, 0.6);
            border-radius: 15px;
            color: #ffffff;
            font-weight: 600;
            font-size: 11px;
            margin-top: 6px;
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.2);
        }
        
        .user-tag::before {
            content: "👤 ";
            margin-right: 4px;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ 在庫管理システム - 管理画面 (2列グリッド版)</h1>
        
        <div class="nav-buttons">
            <button class="nav-btn active" onclick="showSection('inventory')">在庫サマリー</button>
            <button class="nav-btn" onclick="showSection('equipment')">個別機器管理</button>
            <button class="nav-btn" onclick="showSection('reservation-management')">予約管理</button>
            <a href="return.html" class="nav-btn">🔄 返却管理</a>
        </div>
        
        <!-- 在庫サマリーセクション -->
        <div id="inventory" class="section active">
            <div id="inventoryDisplay"></div>
        </div>
        
        <!-- 個別機器管理セクション -->
        <div id="equipment" class="section">
            <div style="color: white; margin-bottom: 20px;">
                <h3 style="text-align: center; margin-bottom: 20px;">🔧 個別機器管理</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap;">
                    <button class="nav-btn active" onclick="filterEquipment('all')">全て</button>
                    <button class="nav-btn" onclick="filterEquipment('available')">利用可能</button>
                    <button class="nav-btn" onclick="filterEquipment('in_use')">使用中</button>
                    <button class="nav-btn" onclick="filterEquipment('maintenance')">メンテナンス中</button>
                </div>
                <div id="equipmentList"></div>
            </div>
        </div>
        
        
        <!-- 予約管理セクション -->
        <div id="reservation-management" class="section">
            <div style="color: white; padding: 20px;">
                <h3 style="text-align: center; margin-bottom: 20px;">📦 予約管理</h3>
                
                <!-- 検索セクション -->
                <div style="background: rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px;">
                    <h4 style="margin-bottom: 15px;">🔍 予約検索</h4>
                    <input type="text" id="reservationSearchInput" placeholder="予約コード（R-XXXXX）またはAliasで検索..." 
                           style="width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 8px; color: white; font-size: 16px; margin-bottom: 10px;">
                    <button onclick="searchReservationForManagement()" style="padding: 10px 20px; background: rgba(52, 152, 219, 0.8); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500;">検索</button>
                </div>
                
                <!-- 検索結果表示 -->
                <div id="reservationManagementResult"></div>
            </div>
        </div>
        
        <a href="index.html" class="back-link">← 予約システムに戻る</a>
    </div>
    
    <script>
        // API Base URL
        const API_BASE_URL = 'https://qqu1ilmtn9.execute-api.ap-northeast-1.amazonaws.com/prod';
        
        // 在庫データ（APIから読み込み）
        async function getInventoryData() {
            try {
                const response = await fetch(`${API_BASE_URL}/inventory`);
                if (!response.ok) {
                    throw new Error('在庫データの取得に失敗しました');
                }
                const inventoryList = await response.json();
                
                // APIレスポンスをグループ化して既存の形式に変換
                const inventory = {};
                inventoryList.forEach(item => {
                    if (!inventory[item.site]) {
                        inventory[item.site] = {};
                    }
                    
                    // equipment_typeを表示名に変換
                    const displayName = item.equipment_type === 'non_amazon_pc' ? 'Non-Amazon PC' :
                                       item.equipment_type === 'amazon_pc' ? 'Amazon PC' :
                                       item.equipment_type === 'monitor' ? 'Monitor' : item.equipment_type;
                    
                    inventory[item.site][displayName] = {
                        total: item.total_quantity,
                        available: item.available_quantity
                    };
                });
                
                return inventory;
            } catch (error) {
                console.error('在庫データ取得エラー:', error);
                alert('在庫データの取得に失敗しました: ' + error.message);
                return {};
            }
        }
        
        async function saveInventoryData(inventoryData) {
            // 在庫データはAPIで管理されるため、この関数は不要
            console.log('saveInventoryData called (no-op in API mode)');
        }
        
        // 個別機器データ（APIから読み込み）
        async function getEquipmentData() {
            try {
                const response = await fetch(`${API_BASE_URL}/equipment`);
                if (!response.ok) {
                    throw new Error('機器データの取得に失敗しました');
                }
                const equipmentList = await response.json();
                
                // APIレスポンスを既存の形式に変換
                return equipmentList.map(item => ({
                    code: item.equipment_code,
                    type: item.equipment_type === 'non_amazon_pc' ? 'Non-Amazon PC' :
                          item.equipment_type === 'amazon_pc' ? 'Amazon PC' :
                          item.equipment_type === 'monitor' ? 'Monitor' : item.equipment_type,
                    site: item.site,
                    status: item.status,
                    currentUser: item.current_user_alias,
                    model: item.model_name || 'N/A',
                    serialNumber: item.serial_number || 'N/A'
                }));
            } catch (error) {
                console.error('機器データ取得エラー:', error);
                alert('機器データの取得に失敗しました: ' + error.message);
                return [];
            }
        }
        
        function getEquipmentDataOld() {
            const stored = localStorage.getItem('equipmentData');
            if (stored) {
                return JSON.parse(stored);
            }
            
            // 初期データ - 個別機器
            const defaultEquipment = [];
            
            // HND10の機器（AL: 20台、NAL: 20台、Monitor: 10台）
            for (let i = 1; i <= 20; i++) {
                defaultEquipment.push({
                    code: `AL${i}`,
                    type: 'Amazon PC',
                    site: 'HND10',
                    status: 'available',
                    currentUser: null,
                    model: 'ThinkPad X1 Carbon',
                    serialNumber: `SN-AL-HND10-${i.toString().padStart(3, '0')}`
                });
            }
            
            for (let i = 1; i <= 20; i++) {
                defaultEquipment.push({
                    code: `NAL${i}`,
                    type: 'Non-Amazon PC',
                    site: 'HND10',
                    status: 'available',
                    currentUser: null,
                    model: 'Dell Latitude',
                    serialNumber: `SN-NAL-HND10-${i.toString().padStart(3, '0')}`
                });
            }
            
            for (let i = 1; i <= 10; i++) {
                defaultEquipment.push({
                    code: `Monitor${i}`,
                    type: 'Monitor',
                    site: 'HND10',
                    status: 'available',
                    currentUser: null,
                    model: 'Dell 24" Monitor',
                    serialNumber: `SN-MON-HND10-${i.toString().padStart(3, '0')}`
                });
            }
            
            // HND17の機器（AL: 20台、NAL: 20台、Monitor: 10台）
            for (let i = 1; i <= 20; i++) {
                defaultEquipment.push({
                    code: `AL${i}`,
                    type: 'Amazon PC',
                    site: 'HND17',
                    status: 'available',
                    currentUser: null,
                    model: 'ThinkPad X1 Carbon',
                    serialNumber: `SN-AL-HND17-${i.toString().padStart(3, '0')}`
                });
            }
            
            for (let i = 1; i <= 20; i++) {
                defaultEquipment.push({
                    code: `NAL${i}`,
                    type: 'Non-Amazon PC',
                    site: 'HND17',
                    status: 'available',
                    currentUser: null,
                    model: 'Dell Latitude',
                    serialNumber: `SN-NAL-HND17-${i.toString().padStart(3, '0')}`
                });
            }
            
            for (let i = 1; i <= 10; i++) {
                defaultEquipment.push({
                    code: `Monitor${i}`,
                    type: 'Monitor',
                    site: 'HND17',
                    status: 'available',
                    currentUser: null,
                    model: 'Dell 24" Monitor',
                    serialNumber: `SN-MON-HND17-${i.toString().padStart(3, '0')}`
                });
            }
            
            // HND21の機器（AL: 20台、NAL: 20台、Monitor: 10台）
            for (let i = 1; i <= 20; i++) {
                defaultEquipment.push({
                    code: `AL${i}`,
                    type: 'Amazon PC',
                    site: 'HND21',
                    status: 'available',
                    currentUser: null,
                    model: 'ThinkPad X1 Carbon',
                    serialNumber: `SN-AL-HND21-${i.toString().padStart(3, '0')}`
                });
            }
            
            for (let i = 1; i <= 20; i++) {
                defaultEquipment.push({
                    code: `NAL${i}`,
                    type: 'Non-Amazon PC',
                    site: 'HND21',
                    status: 'available',
                    currentUser: null,
                    model: 'Dell Latitude',
                    serialNumber: `SN-NAL-HND21-${i.toString().padStart(3, '0')}`
                });
            }
            
            for (let i = 1; i <= 10; i++) {
                defaultEquipment.push({
                    code: `Monitor${i}`,
                    type: 'Monitor',
                    site: 'HND21',
                    status: 'available',
                    currentUser: null,
                    model: 'Dell 24" Monitor',
                    serialNumber: `SN-MON-HND21-${i.toString().padStart(3, '0')}`
                });
            }
            
            saveEquipmentData(defaultEquipment);
            return defaultEquipment;
        }
        
        async function saveEquipmentData(equipmentData) {
            // 機器データはAPIで管理されるため、この関数は不要
            console.log('saveEquipmentData called (no-op in API mode)');
        }
        
        let inventory = {};
        let equipmentList = [];
        let currentFilter = 'all';
        
        // 初期データをロード
        async function initializeData() {
            inventory = await getInventoryData();
            equipmentList = await getEquipmentData();
            renderInventory();
            if (document.getElementById('equipment').classList.contains('active')) {
                renderEquipmentList();
            }
        }
        
        // ページロード時にデータを取得
        initializeData();
        
        function showSection(sectionName) {
            // 全セクションを非表示
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            
            // ナビゲーションボタンを非アクティブ
            document.querySelectorAll('.nav-buttons > .nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // 選択されたセクションを表示
            document.getElementById(sectionName).classList.add('active');
            
            // クリックされたボタンをアクティブに
            event.target.classList.add('active');
            
            // セクションごとの処理
            if (sectionName === 'equipment') {
                renderEquipmentList();
            }
        }
        
        async function getReservations() {
            try {
                const response = await fetch(`${API_BASE_URL}/reservations`);
                if (!response.ok) {
                    throw new Error('予約データの取得に失敗しました');
                }
                return await response.json();
            } catch (error) {
                console.error('予約データ取得エラー:', error);
                return [];
            }
        }
        
        
        function renderInventory() {
            const container = document.getElementById('inventoryDisplay');
            let html = '';
            
            for (let siteId in inventory) {
                html += `
                    <div class="site-card">
                        <div class="site-title">📍 ${siteId}</div>
                `;
                
                for (let equipmentType in inventory[siteId]) {
                    const equipment = inventory[siteId][equipmentType];
                    html += `
                        <div class="equipment-row">
                            <span class="equipment-name">${equipmentType}</span>
                            <div class="equipment-controls">
                                <span style="color: rgba(255,255,255,0.8);">利用可能:</span>
                                <input type="number" class="inventory-input" 
                                       value="${equipment.available}" 
                                       min="0" max="${equipment.total}"
                                       onchange="updateInventory('${siteId}', '${equipmentType}', 'available', this.value)">
                                <span style="color: rgba(255,255,255,0.8);">/ ${equipment.total}台</span>
                                <button class="update-btn" onclick="updateTotal('${siteId}', '${equipmentType}')">総数変更</button>
                            </div>
                        </div>
                    `;
                }
                
                html += '</div>';
            }
            
            container.innerHTML = html;
        }
        
        function filterEquipment(status) {
            currentFilter = status;
            
            // フィルターボタンのアクティブ状態を更新
            document.querySelectorAll('#equipment .nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderEquipmentList();
        }
        
        function renderEquipmentList() {
            const container = document.getElementById('equipmentList');
            let filteredEquipment = equipmentList;
            
            if (currentFilter !== 'all') {
                filteredEquipment = equipmentList.filter(eq => eq.status === currentFilter);
            }
            
            // サイトごとにグループ化
            const groupedBySite = {};
            filteredEquipment.forEach(eq => {
                if (!groupedBySite[eq.site]) {
                    groupedBySite[eq.site] = [];
                }
                groupedBySite[eq.site].push(eq);
            });
            
            let html = '';
            
            for (let site in groupedBySite) {
                const siteEquipment = groupedBySite[site];
                const availableCount = siteEquipment.filter(eq => eq.status === 'available').length;
                const inUseCount = siteEquipment.filter(eq => eq.status === 'in_use').length;
                const maintenanceCount = siteEquipment.filter(eq => eq.status === 'maintenance').length;
                
                html += `<div class="site-card">
                    <div class="site-title">📍 ${site}
                        <span style="font-size: 12px; font-weight: normal; margin-left: 15px;">
                            🟢 ${availableCount} 利用可能 &nbsp; 🔴 ${inUseCount} 使用中 &nbsp; 🟡 ${maintenanceCount} メンテナンス
                        </span>
                    </div>
                    <div class="equipment-grid">`;
                
                groupedBySite[site].forEach(equipment => {
                    const statusText = {
                        'available': '利用可能',
                        'in_use': '使用中',
                        'maintenance': 'メンテナンス中'
                    }[equipment.status];
                    
                    html += `
                        <div class="equipment-card ${equipment.status}">
                            <div class="equipment-header">
                                <span class="equipment-code">${equipment.code}</span>
                                <span class="status-badge ${equipment.status}">${statusText}</span>
                            </div>
                            <div class="equipment-details">
                                <div>タイプ: ${equipment.type}</div>
                                <div>モデル: <span id="model-${equipment.code}">${equipment.model}</span></div>
                                <div style="grid-column: 1 / -1;">S/N: <span id="sn-${equipment.code}">${equipment.serialNumber}</span></div>
                            </div>
                            ${equipment.currentUser ? `<div class="user-tag">👤 ${equipment.currentUser}</div>` : ''}
                            <div style="margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap;">
                                <button class="update-btn" style="font-size: 11px; padding: 4px 12px; background: rgba(52, 152, 219, 0.8);" onclick="editEquipmentInfo('${equipment.code}')">📝 編集</button>
                                ${equipment.status === 'available' ? 
                                    `<button class="update-btn" style="font-size: 11px; padding: 4px 12px;" onclick="setEquipmentStatus('${equipment.code}', 'maintenance')">メンテナンス</button>` : ''}
                                ${equipment.status === 'maintenance' ? 
                                    `<button class="update-btn" style="font-size: 11px; padding: 4px 12px;" onclick="setEquipmentStatus('${equipment.code}', 'available')">利用可能に戻す</button>` : ''}
                                ${equipment.status === 'in_use' ? 
                                    `<button class="update-btn" style="background: rgba(231, 76, 60, 0.8); font-size: 11px; padding: 4px 12px;" onclick="returnEquipment('${equipment.code}')">返却処理</button>` : ''}
                            </div>
                        </div>
                    `;
                });
                
                html += '</div></div>';
            }
            
            if (filteredEquipment.length === 0) {
                html = '<div style="text-align: center; color: rgba(255,255,255,0.6); padding: 40px;">該当する機器がありません</div>';
            }
            
            container.innerHTML = html;
        }
        
        async function setEquipmentStatus(code, newStatus) {
            try {
                const equipment = equipmentList.find(eq => eq.code === code);
                if (!equipment) return;
                
                const response = await fetch(`${API_BASE_URL}/equipment/${code}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        status: newStatus,
                        current_user_alias: newStatus === 'available' ? null : equipment.currentUser
                    })
                });
                
                if (!response.ok) {
                    throw new Error('ステータス更新に失敗しました');
                }
                
                // ローカルデータを更新
                equipment.status = newStatus;
                if (newStatus === 'available') {
                    equipment.currentUser = null;
                }
                
                renderEquipmentList();
                alert('ステータスを更新しました');
            } catch (error) {
                console.error('ステータス更新エラー:', error);
                alert('ステータスの更新に失敗しました: ' + error.message);
            }
        }
        
        function updateInventory(siteId, equipmentType, field, value) {
            const numValue = parseInt(value);
            if (numValue >= 0 && numValue <= inventory[siteId][equipmentType].total) {
                inventory[siteId][equipmentType][field] = numValue;
                saveInventoryData(inventory);
                console.log(`${siteId} ${equipmentType} ${field} を ${numValue} に更新`);
            } else {
                alert('無効な値です。0以上、総数以下の値を入力してください。');
                renderInventory();
            }
        }
        
        function updateTotal(siteId, equipmentType) {
            const newTotal = prompt(`${siteId} ${equipmentType} の総数を入力してください:`, 
                                   inventory[siteId][equipmentType].total);
            
            if (newTotal !== null) {
                const numTotal = parseInt(newTotal);
                if (numTotal >= 0) {
                    inventory[siteId][equipmentType].total = numTotal;
                    // 利用可能数が総数を超えないように調整
                    if (inventory[siteId][equipmentType].available > numTotal) {
                        inventory[siteId][equipmentType].available = numTotal;
                    }
                    saveInventoryData(inventory);
                    renderInventory();
                }
            }
        }
        
        function returnEquipment(code) {
            const equipment = equipmentList.find(eq => eq.code === code);
            if (equipment && equipment.status === 'in_use') {
                if (confirm(`${equipment.code} を返却処理しますか？\n使用者: ${equipment.currentUser}`)) {
                    equipment.status = 'available';
                    equipment.currentUser = null;
                    saveEquipmentData(equipmentList);
                    renderEquipmentList();
                    alert('返却処理が完了しました。');
                }
            }
        }
        
        async function editEquipmentInfo(code) {
            const equipment = equipmentList.find(eq => eq.code === code);
            if (!equipment) return;
            
            const newModel = prompt(`モデル名を入力してください:\n(現在: ${equipment.model})`, equipment.model);
            if (newModel === null) return; // キャンセル
            
            const newSerialNumber = prompt(`シリアル番号を入力してください:\n(現在: ${equipment.serialNumber})`, equipment.serialNumber);
            if (newSerialNumber === null) return; // キャンセル
            
            try {
                const response = await fetch(`${API_BASE_URL}/equipment/${code}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model_name: newModel.trim() || equipment.model,
                        serial_number: newSerialNumber.trim() || equipment.serialNumber
                    })
                });
                
                if (!response.ok) {
                    throw new Error('機器情報の更新に失敗しました');
                }
                
                // ローカルデータを更新
                equipment.model = newModel.trim() || equipment.model;
                equipment.serialNumber = newSerialNumber.trim() || equipment.serialNumber;
                
                renderEquipmentList();
                alert('機器情報を更新しました。');
            } catch (error) {
                console.error('機器情報更新エラー:', error);
                alert('機器情報の更新に失敗しました: ' + error.message);
            }
        }
        
        // 予約管理機能
        async function searchReservationForManagement() {
            const searchTerm = document.getElementById('reservationSearchInput').value.trim();
            const resultContainer = document.getElementById('reservationManagementResult');
            
            if (!searchTerm) {
                resultContainer.innerHTML = '<div style="color: rgba(255,255,255,0.7); text-align: center; padding: 20px;">予約コードまたはAliasを入力してください</div>';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/reservations/search?q=${encodeURIComponent(searchTerm)}`);
                if (!response.ok) throw new Error('検索に失敗しました');
                const results = await response.json();
                
                if (results.length === 0) {
                    resultContainer.innerHTML = '<div style="color: rgba(255,255,255,0.7); text-align: center; padding: 20px;">予約が見つかりませんでした</div>';
                    return;
                }
                
                if (results.length === 1) {
                    await renderReservationManagement(results[0]);
                } else {
                    // 複数件の場合はリスト表示
                    let html = '<div style="margin-bottom: 15px; color: rgba(255,255,255,0.8);">' + results.length + '件の予約が見つかりました</div>';
                    results.forEach(r => {
                        const statusLabel = {pending:'未設置', confirmed:'利用中', setup_complete:'利用中', returned:'返却済み', cancelled:'キャンセル'}[r.status] || r.status;
                        html += '<div style="background: rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;" onclick="renderReservationManagement(' + JSON.stringify(r).replace(/"/g, '&quot;') + ')">';
                        html += '<div><strong>' + (r.booking_code || r.id.substring(0,8)) + '</strong> - ' + r.user_alias + '</div>';
                        html += '<div>' + statusLabel + ' | ' + r.pickup_site + ' | ' + new Date(r.start_date).toLocaleDateString('ja-JP') + '</div>';
                        html += '</div>';
                    });
                    resultContainer.innerHTML = html;
                }
            } catch (error) {
                console.error('予約検索エラー:', error);
                resultContainer.innerHTML = '<div style="color: #e74c3c; text-align: center; padding: 20px;">エラーが発生しました: ' + error.message + '</div>';
            }
        }
        
        async function renderReservationManagement(reservation) {
            const resultContainer = document.getElementById('reservationManagementResult');
            
            // 予約詳細を取得（機器情報含む）
            let allocatedEquipment = [];
            try {
                const detailResponse = await fetch(`${API_BASE_URL}/reservations/${reservation.id}`);
                if (detailResponse.ok) {
                    const detail = await detailResponse.json();
                    allocatedEquipment = detail.allocated_equipment || [];
                }
            } catch (error) {
                console.error('機器情報取得エラー:', error);
            }
            
            // 機器リストHTML
            let equipmentHtml = '';
            if (allocatedEquipment.length > 0) {
                equipmentHtml = '<div style="margin-top: 15px;"><strong>🔧 割り当てられた機器:</strong><ul style="margin-top: 10px;">';
                allocatedEquipment.forEach(eq => {
                    const typeLabel = eq.type === 'amazon_pc' ? 'Amazon PC' : 
                                     eq.type === 'non_amazon_pc' ? 'Non-Amazon PC' : 'Monitor';
                    equipmentHtml += `<li>${eq.equipment_code} (${typeLabel})</li>`;
                });
                equipmentHtml += '</ul></div>';
            }
            
            // ステータスバッジ
            let statusBadge = '';
            let actionButtons = '';
            
            if (reservation.status === 'pending') {
                statusBadge = '<span style="background: rgba(241, 196, 15, 0.8); padding: 5px 15px; border-radius: 5px;">未設置</span>';
                actionButtons = `
                    <button onclick="markAsSetupComplete('${reservation.id}')" 
                            style="padding: 10px 20px; background: rgba(46, 204, 113, 0.8); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; margin-right: 10px;">
                        ✅ 設置完了
                    </button>
                `;
            } else if (reservation.status === 'confirmed' || reservation.status === 'setup_complete') {
                statusBadge = '<span style="background: rgba(46, 204, 113, 0.8); padding: 5px 15px; border-radius: 5px;">利用中</span>';
                actionButtons = `
                    <button onclick="markAsReturned('${reservation.id}')" 
                            style="padding: 10px 20px; background: rgba(231, 76, 60, 0.8); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; margin-right: 10px;">
                        🔄 返却完了
                    </button>
                `;
            } else if (reservation.status === 'returned') {
                statusBadge = '<span style="background: rgba(149, 165, 166, 0.8); padding: 5px 15px; border-radius: 5px;">返却済み</span>';
                actionButtons = '<div style="color: rgba(255,255,255,0.7);">この予約は既に返却済みです</div>';
            } else if (reservation.status === 'cancelled') {
                statusBadge = '<span style="background: rgba(231, 76, 60, 0.8); padding: 5px 15px; border-radius: 5px;">キャンセル済み</span>';
                actionButtons = '<div style="color: rgba(255,255,255,0.7);">この予約はキャンセルされています</div>';
            }
            
            const html = `
                <div style="background: rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h4>予約詳細</h4>
                        ${statusBadge}
                    </div>
                    <div style="line-height: 1.8;">
                        <strong>予約コード:</strong> ${reservation.booking_code || reservation.id.substring(0,8)}<br>
                        <strong>👤 利用者:</strong> ${reservation.user_alias}<br>
                        <strong>📍 サイト:</strong> ${reservation.pickup_site}<br>
                        <strong>📅 期間:</strong> ${reservation.start_date.split('T')[0]} ～ ${reservation.end_date.split('T')[0]}<br>
                        <strong>📝 予約日:</strong> ${new Date(reservation.created_at).toLocaleDateString('ja-JP')}
                        ${equipmentHtml}
                    </div>
                    <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.2);">
                        ${actionButtons}
                    </div>
                </div>
            `;
            
            resultContainer.innerHTML = html;
        }
        
        async function markAsSetupComplete(reservationId) {
            if (!confirm('この予約を「設置完了」にしますか？')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/reservations/${reservationId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'setup_complete' })
                });
                
                if (!response.ok) {
                    throw new Error('ステータス更新に失敗しました');
                }
                
                alert('設置完了にしました！');
                searchReservationForManagement();
            } catch (error) {
                console.error('設置完了エラー:', error);
                alert('エラーが発生しました: ' + error.message);
            }
        }
        
        async function markAsReturned(reservationId) {
            if (!confirm('この予約を「返却完了」にしますか？\n\n機器のステータスも「利用可能」に戻ります。')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/reservations/${reservationId}/cancel`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (!response.ok) {
                    throw new Error('返却処理に失敗しました');
                }
                
                alert('返却完了しました！機器が利用可能になりました。');
                searchReservationForManagement();
            } catch (error) {
                console.error('返却完了エラー:', error);
                alert('エラーが発生しました: ' + error.message);
            }
        }
        
        // Enterキーで検索
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('reservationSearchInput');
            if (searchInput) {
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        searchReservationForManagement();
                    }
                });
            }
        });
    </script>
</body>
</html>
